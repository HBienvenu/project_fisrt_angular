<header class="shadow-1 p-3 mb-4">
  <div class="container flex justify-content-between align-items-center">
    <a routerLink="/" class="flex gap-2 align-items-center navbar-logo">
      <img src="/images/logo.png" alt="logo" width="36" height="36" />
      Angular Project
    </a>
    <div class="flex gap-2">
      <p-button
        size="small"
        severity="secondary"
        (onClick)="toggleDarkMode()"
        [icon]="isDark() ? 'pi pi-sun' : 'pi pi-moon'"
      />
      <p-button label="Ajouter" routerLink="/prompts/create" icon="pi pi-plus" size="small" />
    </div>
  </div>
</header>
